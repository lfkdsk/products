<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lfkdsk · 产品集</title>
    <meta name="description" content="lfkdsk 的个人产品展示集" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230a0a0c'/><text x='50' y='72' font-size='62' font-family='-apple-system,system-ui,sans-serif' font-weight='700' fill='%23a78bfa' text-anchor='middle'>l</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div class="backdrop" aria-hidden="true"></div>

    <!-- 顶部导航 -->
    <header class="topbar">
      <a class="brand" href="#top" aria-label="首页">
        <span class="brand-mark">lf</span>
        <span class="brand-text">lfkdsk<span class="brand-sub">/ products</span></span>
      </a>
      <nav class="nav-actions">
        <a
          class="nav-link"
          href="https://github.com/lfkdsk"
          target="_blank"
          rel="noopener"
          aria-label="GitHub"
          title="GitHub"
        >
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 .5C5.37.5 0 5.78 0 12.29c0 5.21 3.44 9.63 8.2 11.19.6.11.82-.25.82-.57 0-.28-.01-1.02-.02-2-3.34.71-4.04-1.58-4.04-1.58-.55-1.36-1.33-1.73-1.33-1.73-1.09-.73.08-.71.08-.71 1.2.08 1.83 1.21 1.83 1.21 1.07 1.79 2.81 1.27 3.5.97.11-.76.42-1.27.76-1.56-2.67-.3-5.47-1.31-5.47-5.81 0-1.28.47-2.33 1.23-3.15-.12-.3-.53-1.51.12-3.15 0 0 1-.31 3.3 1.2.96-.26 1.98-.39 3-.4 1.02.01 2.04.14 3 .4 2.28-1.51 3.29-1.2 3.29-1.2.65 1.64.24 2.85.12 3.15.77.82 1.23 1.87 1.23 3.15 0 4.51-2.81 5.5-5.49 5.79.43.36.81 1.08.81 2.18 0 1.58-.01 2.85-.01 3.24 0 .31.21.69.82.57C20.57 21.91 24 17.5 24 12.29 24 5.78 18.63.5 12 .5z"/></svg>
        </a>
        <button id="themeToggle" class="theme-toggle" aria-label="切换深色 / 浅色" title="切换深色 / 浅色">
          <svg class="icon-sun" viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </nav>
    </header>

    <main id="top">
      <!-- 英雄区 -->
      <section class="hero">
        <p class="hero-eyebrow"><span class="dot"></span> PRODUCT COLLECTION</p>
        <h1 class="hero-title">我们的产品</h1>
        <p class="hero-subtitle">
          这些是我亲手做的一些小东西 —— 工具、应用与服务，都还活着。
        </p>
        <div class="hero-stats" id="heroStats"></div>
      </section>

      <!-- 搜索 -->
      <section class="toolbar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="searchInput" type="search" placeholder="搜索产品、标签或关键词…" autocomplete="off" />
        </div>
      </section>

      <!-- 产品区块（按分类）-->
      <div id="sections" aria-live="polite"></div>

      <!-- 空状态 -->
      <section class="empty-state" id="emptyState" hidden>
        <div class="empty-icon">🔍</div>
        <h2 id="emptyTitle">还没有产品</h2>
        <p id="emptyDesc">在 <code>data/products.js</code> 里添加你的第一个产品吧。</p>
      </section>
    </main>

    <footer class="footer">
      <p>© <span id="year"></span> lfkdsk · 用 ❤️ 与 Claude 一起构建</p>
    </footer>

    <script src="data/products.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
